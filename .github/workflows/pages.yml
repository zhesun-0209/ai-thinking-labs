name: Deploy static site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fonts for CJK plots
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Render notebook HTML
        run: |
          pip install -r scripts/requirements-notebooks.txt
          python -m ipykernel install --user --name python3
          python scripts/generate_all_notebooks.py
          python scripts/render_notebooks.py

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
